<!-- Cinematic Portfolio (HTML + CSS + Bootstrap + JS) -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shazan Portfolio</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .card {
      background: #111;
      border: none;
      color: white;
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .filter-btn {
      margin: 5px;
    }

    .modal-content {
      background: #111;
      color: white;
    }
  </style>
</head>

<body>

<!-- Hero Section -->
<section class="hero">
  <h1 class="display-3">SHAZAN</h1>
  <p class="text-muted">Script Writer • Storyteller • CSE Mind</p>
</section>

<!-- Filter Buttons -->
<div class="text-center mb-4">
  <button class="btn btn-outline-light filter-btn" onclick="filterScripts('All')">All</button>
  <button class="btn btn-outline-light filter-btn" onclick="filterScripts('Drama')">Drama</button>
  <button class="btn btn-outline-light filter-btn" onclick="filterScripts('Thriller')">Thriller</button>
</div>

<!-- Scripts Section -->
<div class="container">
  <div class="row" id="scriptContainer"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="scriptModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content p-4">
      <h3 id="modalTitle"></h3>
      <p id="modalContent" class="mt-3"></p>
      <button class="btn btn-light mt-3" data-bs-dismiss="modal">Close</button>
    </div>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const scripts = [
  {
    title: "Echoes of Silence",
    category: "Drama",
    description: "A haunting story of memory and loss.",
    content: "Full script content here..."
  },
  {
    title: "Midnight Run",
    category: "Thriller",
    description: "A high-speed chase against time.",
    content: "Thriller script content..."
  }
];

function displayScripts(data) {
  const container = document.getElementById("scriptContainer");
  container.innerHTML = "";

  data.forEach(script => {
    container.innerHTML += `
      <div class="col-md-6 mb-4">
        <div class="card p-4" onclick="openModal('${script.title}', '${script.content}')">
          <h4>${script.title}</h4>
          <p class="text-muted">${script.description}</p>
          <small>${script.category}</small>
        </div>
      </div>
    `;
  });
}

function filterScripts(category) {
  if (category === "All") {
    displayScripts(scripts);
  } else {
    const filtered = scripts.filter(s => s.category === category);
    displayScripts(filtered);
  }
}

function openModal(title, content) {
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalContent").innerText = content;

  const modal = new bootstrap.Modal(document.getElementById('scriptModal'));
  modal.show();
}

// Initial load
filterScripts('All');
</script>

</body>
</html>
